<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pong Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }
        .header { color: white; text-align: center; margin-bottom: 12px; }
        .header h1 { font-size: 24px; margin-bottom: 5px; }
        .container {
            background: white;
            border-radius: 10px;
            padding: 15px;
            width: 100%;
            max-width: 320px;
            text-align: center;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
        }
        canvas {
            border: 3px solid #333;
            background: #000;
            width: 100%;
            display: block;
            margin-bottom: 15px;
            border-radius: 6px;
        }
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 10px;
        }
        .stat {
            background: #f0f0f0;
            padding: 8px;
            border-radius: 6px;
        }
        .stat-label { font-size: 11px; color: #666; }
        .stat-value { font-size: 18px; font-weight: bold; color: #667eea; }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 8px;
        }
        button:active { transform: scale(0.95); }
        .info { font-size: 11px; color: #666; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏓 Pong</h1>
        <p style="color: white; font-size: 12px;">vs AI</p>
    </div>
    
    <div class="container">
        <canvas id="pong" width="280" height="280"></canvas>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-label">You</div>
                <div class="stat-value" id="playerScore">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">AI</div>
                <div class="stat-value" id="aiScore">0</div>
            </div>
        </div>
        
        <button onclick="startGame()">Start Game</button>
        <button onclick="resetGame()">Reset</button>
        
        <div class="info">Swipe or tap UP/DOWN to move paddle</div>
    </div>
    
    <script>
        const canvas = document.getElementById('pong');
        const ctx = canvas.getContext('2d');
        
        const PADDLE_HEIGHT = 50;
        const PADDLE_WIDTH = 8;
        const BALL_SIZE = 6;
        
        let playerY = canvas.height / 2 - PADDLE_HEIGHT / 2;
        let aiY = canvas.height / 2 - PADDLE_HEIGHT / 2;
        let ballX = canvas.width / 2;
        let ballY = canvas.height / 2;
        let ballDX = 3;
        let ballDY = 3;
        let playerScore = 0;
        let aiScore = 0;
        let gameRunning = false;
        
        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = '#fff';
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);
            
            ctx.fillStyle = '#fff';
            ctx.fillRect(10, playerY, PADDLE_WIDTH, PADDLE_HEIGHT);
            ctx.fillRect(canvas.width - 18, aiY, PADDLE_WIDTH, PADDLE_HEIGHT);
            
            ctx.beginPath();
            ctx.arc(ballX, ballY, BALL_SIZE, 0, Math.PI * 2);
            ctx.fill();
        }
        
        function update() {
            if (!gameRunning) return;
            
            ballX += ballDX;
            ballY += ballDY;
            
            if (ballY - BALL_SIZE < 0 || ballY + BALL_SIZE > canvas.height) {
                ballDY = -ballDY;
                ballY = Math.max(BALL_SIZE, Math.min(canvas.height - BALL_SIZE, ballY));
            }
            
            if (ballX - BALL_SIZE < 20 && ballY > playerY && ballY < playerY + PADDLE_HEIGHT) {
                ballDX = -ballDX;
                ballX = 20 + BALL_SIZE;
            }
            
            if (ballX + BALL_SIZE > canvas.width - 20 && ballY > aiY && ballY < aiY + PADDLE_HEIGHT) {
                ballDX = -ballDX;
                ballX = canvas.width - 20 - BALL_SIZE;
            }
            
            if (ballX < 0) {
                aiScore++;
                resetBall();
            }
            
            if (ballX > canvas.width) {
                playerScore++;
                resetBall();
            }
            
            aiY += (ballY - (aiY + PADDLE_HEIGHT / 2)) * 0.05;
            aiY = Math.max(0, Math.min(canvas.height - PADDLE_HEIGHT, aiY));
            
            document.getElementById('playerScore').textContent = playerScore;
            document.getElementById('aiScore').textContent = aiScore;
        }
        
        function resetBall() {
            ballX = canvas.width / 2;
            ballY = canvas.height / 2;
            ballDX = (Math.random() > 0.5 ? 1 : -1) * 3;
            ballDY = (Math.random() * 2 - 1) * 3;
        }
        
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        let touchStartY = 0;
        document.addEventListener('touchstart', (e) => {
            touchStartY = e.touches[0].clientY;
        });
        
        document.addEventListener('touchmove', (e) => {
            const touchY = e.touches[0].clientY;
            const diff = touchY - touchStartY;
            playerY += diff * 0.5;
            playerY = Math.max(0, Math.min(canvas.height - PADDLE_HEIGHT, playerY));
            touchStartY = touchY;
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp' || e.key === 'w') {
                playerY = Math.max(0, playerY - 15);
            }
            if (e.key === 'ArrowDown' || e.key === 's') {
                playerY = Math.min(canvas.height - PADDLE_HEIGHT, playerY + 15);
            }
        });
        
        function startGame() {
            gameRunning = true;
        }
        
        function resetGame() {
            playerScore = 0;
            aiScore = 0;
            playerY = canvas.height / 2 - PADDLE_HEIGHT / 2;
            aiY = canvas.height / 2 - PADDLE_HEIGHT / 2;
            resetBall();
            gameRunning = false;
            document.getElementById('playerScore').textContent = '0';
            document.getElementById('aiScore').textContent = '0';
            draw();
        }
        
        resetGame();
        gameLoop();
    </script>
</body>
</html>
