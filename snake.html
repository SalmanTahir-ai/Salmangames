<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
        }
        .header { color: white; text-align: center; margin-bottom: 10px; }
        .header h1 { font-size: 24px; margin-bottom: 5px; }
        .container {
            background: white;
            border-radius: 10px;
            padding: 12px;
            width: 100%;
            max-width: 320px;
        }
        .scores {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 10px;
        }
        .score-box {
            background: #f0f0f0;
            padding: 8px;
            border-radius: 6px;
            text-align: center;
        }
        .score-label { font-size: 11px; color: #666; }
        .score-value { font-size: 18px; font-weight: bold; color: #667eea; }
        canvas {
            border: 2px solid #333;
            background: #1a1a1a;
            width: 100%;
            display: block;
            margin-bottom: 12px;
            border-radius: 6px;
        }
        .game-controls {
            background: #f9f9f9;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .arrow-label {
            font-size: 10px;
            color: #666;
            text-align: center;
            margin-bottom: 8px;
            font-weight: bold;
        }
        .arrow-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            max-width: 180px;
            margin: 0 auto;
        }
        .arrow-btn {
            padding: 12px;
            border: 2px solid #667eea;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
            transition: all 0.1s;
        }
        .arrow-btn:active { 
            background: #667eea; 
            color: white;
            transform: scale(0.9);
        }
        .empty { background: none; border: none; }
        .btn-up { grid-column: 2; grid-row: 1; }
        .btn-left { grid-column: 1; grid-row: 2; }
        .btn-center { grid-column: 2 / 4; grid-row: 2; background: #667eea; color: white; }
        .btn-right { grid-column: 4; grid-row: 2; }
        .btn-down { grid-column: 2; grid-row: 3; }
        .buttons { display: flex; gap: 8px; }
        button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        button:active { transform: scale(0.95); }
        .info { font-size: 11px; color: #666; text-align: center; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🐍 Snake</h1>
    </div>
    
    <div class="container">
        <div class="scores">
            <div class="score-box">
                <div class="score-label">Score</div>
                <div class="score-value" id="score">0</div>
            </div>
            <div class="score-box">
                <div class="score-label">High</div>
                <div class="score-value" id="high">0</div>
            </div>
        </div>
        
        <canvas id="game" width="280" height="280"></canvas>
        
        <div class="game-controls">
            <div class="arrow-label">📍 Steering Wheel Style</div>
            <div class="arrow-grid">
                <div class="empty"></div>
                <button class="arrow-btn btn-up" onclick="setDir(0, -1)">⬆️</button>
                <div class="empty"></div>
                <div class="empty"></div>
                
                <button class="arrow-btn btn-left" onclick="setDir(-1, 0)">⬅️</button>
                <button class="arrow-btn btn-center" disabled>🎮</button>
                <button class="arrow-btn btn-right" onclick="setDir(1, 0)">➡️</button>
                <div class="empty"></div>
                
                <div class="empty"></div>
                <button class="arrow-btn btn-down" onclick="setDir(0, 1)">⬇️</button>
                <div class="empty"></div>
                <div class="empty"></div>
            </div>
        </div>
        
        <div class="buttons">
            <button onclick="start()">Start</button>
            <button onclick="reset()">Reset</button>
        </div>
        
        <div class="info">Eat food, grow, avoid walls!</div>
    </div>
    
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        
        let snake = [{x: 7, y: 7}];
        let food = {x: 10, y: 10};
        let dir = {x: 1, y: 0};
        let nextDir = {x: 1, y: 0};
        let score = 0;
        let highScore = parseInt(localStorage.getItem('snakeHigh')) || 0;
        let gameRunning = false;
        let frameCount = 0;
        let gameSpeed = 12;
        let particles = [];
        
        document.getElementById('high').textContent = highScore;
        
        function setDir(x, y) {
            if ((dir.x === -x || dir.x === x) && (dir.y === -y || dir.y === y)) return;
            nextDir = {x, y};
        }
        
        function drawSnakeHead(x, y) {
            // Head main body
            ctx.fillStyle = '#1b5e20';
            ctx.fillRect(x + 2, y + 2, gridSize - 4, gridSize - 4);
            
            // Head shine/highlight
            ctx.fillStyle = '#388e3c';
            ctx.fillRect(x + 3, y + 3, 6, 6);
            
            // Eyes - white
            ctx.fillStyle = '#ffffff';
            const eyeSize = 3;
            
            if (dir.x === 1) {
                // Looking right
                ctx.fillRect(x + 12, y + 6, eyeSize, eyeSize);
                ctx.fillRect(x + 12, y + 11, eyeSize, eyeSize);
            } else if (dir.x === -1) {
                // Looking left
                ctx.fillRect(x + 5, y + 6, eyeSize, eyeSize);
                ctx.fillRect(x + 5, y + 11, eyeSize, eyeSize);
            } else if (dir.y === -1) {
                // Looking up
                ctx.fillRect(x + 6, y + 5, eyeSize, eyeSize);
                ctx.fillRect(x + 11, y + 5, eyeSize, eyeSize);
            } else if (dir.y === 1) {
                // Looking down
                ctx.fillRect(x + 6, y + 12, eyeSize, eyeSize);
                ctx.fillRect(x + 11, y + 12, eyeSize, eyeSize);
            }
            
            // Pupils - black
            ctx.fillStyle = '#000000';
            if (dir.x === 1) {
                ctx.fillRect(x + 13, y + 7, 1, 1);
                ctx.fillRect(x + 13, y + 12, 1, 1);
            } else if (dir.x === -1) {
                ctx.fillRect(x + 6, y + 7, 1, 1);
                ctx.fillRect(x + 6, y + 12, 1, 1);
            } else if (dir.y === -1) {
                ctx.fillRect(x + 7, y + 6, 1, 1);
                ctx.fillRect(x + 12, y + 6, 1, 1);
            } else if (dir.y === 1) {
                ctx.fillRect(x + 7, y + 13, 1, 1);
                ctx.fillRect(x + 12, y + 13, 1, 1);
            }
        }
        
        function drawSnakeBody(x, y) {
            // Body gradient
            ctx.fillStyle = '#4CAF50';
            ctx.fillRect(x + 3, y + 3, gridSize - 6, gridSize - 6);
            
            // Body highlight
            ctx.fillStyle = '#66BB6A';
            ctx.fillRect(x + 4, y + 4, 4, 4);
        }
        
        function drawSnake() {
            snake.forEach((segment, index) => {
                const x = segment.x * gridSize;
                const y = segment.y * gridSize;
                
                if (index === 0) {
                    drawSnakeHead(x, y);
                } else {
                    drawSnakeBody(x, y);
                }
            });
        }
        
        function drawFood() {
            const x = food.x * gridSize;
            const y = food.y * gridSize;
            
            // Apple body
            ctx.fillStyle = '#ff6b6b';
            ctx.beginPath();
            ctx.arc(x + gridSize / 2, y + gridSize / 2, 7, 0, Math.PI * 2);
            ctx.fill();
            
            // Apple shine
            ctx.fillStyle = '#ff8888';
            ctx.beginPath();
            ctx.arc(x + gridSize / 2 - 2, y + gridSize / 2 - 2, 3, 0, Math.PI * 2);
            ctx.fill();
        }
        
        function updateParticles() {
            particles.forEach((p, idx) => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.03;
                p.vy += 0.2; // gravity
            });
            particles = particles.filter(p => p.life > 0);
        }
        
        function drawParticles() {
            particles.forEach(p => {
                ctx.fillStyle = `rgba(255, 215, 0, ${p.life})`;
                ctx.shadowColor = 'rgba(255, 215, 0, 0.8)';
                ctx.shadowBlur = 8;
                
                // Draw star
                drawStar(p.x, p.y, 5, p.size, p.size / 2);
                
                ctx.shadowColor = 'transparent';
            });
        }
        
        function drawStar(cx, cy, spikes, outerRadius, innerRadius) {
            let rot = Math.PI / 2 * 3;
            let step = Math.PI / spikes;
            
            ctx.beginPath();
            ctx.moveTo(cx, cy - outerRadius);
            for (let i = 0; i < spikes; i++) {
                ctx.lineTo(cx + Math.cos(rot) * outerRadius, cy + Math.sin(rot) * outerRadius);
                rot += step;
                ctx.lineTo(cx + Math.cos(rot) * innerRadius, cy + Math.sin(rot) * innerRadius);
                rot += step;
            }
            ctx.lineTo(cx, cy - outerRadius);
            ctx.closePath();
            ctx.fill();
        }
        
        function draw() {
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            drawFood();
            drawSnake();
            updateParticles();
            drawParticles();
        }
        
        function createExplosion(x, y) {
            const centerX = x * gridSize + gridSize / 2;
            const centerY = y * gridSize + gridSize / 2;
            
            for (let i = 0; i < 15; i++) {
                const angle = (i / 15) * Math.PI * 2;
                const speed = 3 + Math.random() * 3;
                particles.push({
                    x: centerX,
                    y: centerY,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - 2,
                    life: 1,
                    size: 6 + Math.random() * 4
                });
            }
        }
        
        function update() {
            if (!gameRunning) return;
            
            frameCount++;
            if (frameCount < gameSpeed) return;
            frameCount = 0;
            
            dir = nextDir;
            let head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
            
            if (head.x < 0 || head.x >= 14 || head.y < 0 || head.y >= 14) {
                createExplosion(snake[0].x, snake[0].y);
                gameRunning = false;
                setTimeout(end, 800);
                return;
            }
            
            if (snake.some(s => s.x === head.x && s.y === head.y)) {
                createExplosion(snake[0].x, snake[0].y);
                gameRunning = false;
                setTimeout(end, 800);
                return;
            }
            
            snake.unshift(head);
            
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                gameSpeed = Math.max(8, gameSpeed - 0.5);
                
                let newFood;
                do {
                    newFood = {
                        x: Math.floor(Math.random() * 14),
                        y: Math.floor(Math.random() * 14)
                    };
                } while (snake.some(s => s.x === newFood.x && s.y === newFood.y));
                food = newFood;
            } else {
                snake.pop();
            }
        }
        
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        function start() {
            gameRunning = true;
        }
        
        function end() {
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHigh', highScore);
                document.getElementById('high').textContent = highScore;
            }
            alert('Game Over! Score: ' + score);
        }
        
        function reset() {
            snake = [{x: 7, y: 7}];
            dir = {x: 1, y: 0};
            nextDir = {x: 1, y: 0};
            score = 0;
            gameRunning = false;
            gameSpeed = 12;
            frameCount = 0;
            particles = [];
            document.getElementById('score').textContent = '0';
            
            let newFood;
            do {
                newFood = {
                    x: Math.floor(Math.random() * 14),
                    y: Math.floor(Math.random() * 14)
                };
            } while (snake.some(s => s.x === newFood.x && s.y === newFood.y));
            food = newFood;
            
            draw();
        }
        
        reset();
        gameLoop();
    </script>
</body>
</html>
