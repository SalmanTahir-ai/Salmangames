<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memory Challenge</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            width: 100%;
            height: 100vh;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .game-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        /* ===== INFO PANEL ===== */
        .info-panel {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            align-items: center;
            color: white;
            font-weight: bold;
            text-align: center;
        }

        .info-box {
            background: rgba(0, 0, 0, 0.3);
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 16px;
            backdrop-filter: blur(10px);
        }

        .info-box span {
            font-size: 28px;
            color: #FFD700;
            display: block;
            margin-top: 5px;
        }

        /* ===== GAME STATUS ===== */
        .status-text {
            position: absolute;
            top: 150px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            height: 30px;
            animation: statusSlide 0.5s ease;
        }

        @keyframes statusSlide {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== GRID ===== */
        .memory-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 320px;
            aspect-ratio: 1;
            margin-top: 40px;
        }

        .memory-box {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .memory-box:hover:not(.disabled) {
            transform: scale(1.05);
            border-color: rgba(255, 255, 255, 0.6);
        }

        .memory-box:active:not(.disabled) {
            transform: scale(0.95);
        }

        .memory-box.disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        .memory-box.active {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border-color: #FFD700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            animation: boxFlash 0.6s ease;
        }

        @keyframes boxFlash {
            0% {
                transform: scale(1);
                box-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
            }
        }

        /* ===== BUTTONS ===== */
        .button-group {
            position: absolute;
            bottom: 30px;
            display: flex;
            gap: 15px;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .start-btn {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4);
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.6);
        }

        .start-btn:active {
            transform: translateY(0);
        }

        .restart-btn {
            background: linear-gradient(135deg, #FF6B6B, #FF4444);
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
        }

        .restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.6);
        }

        .restart-btn:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* ===== GAME OVER MODAL ===== */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.5);
            max-width: 300px;
        }

        .modal-content h1 {
            font-size: 32px;
            color: #667eea;
            margin-bottom: 20px;
        }

        .modal-stats {
            font-size: 18px;
            color: #333;
            margin: 20px 0;
            line-height: 2;
        }

        .stat-num {
            font-size: 32px;
            font-weight: bold;
            color: #FF6B6B;
        }

        .modal-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
        }

        .modal-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .modal-btn:active {
            transform: translateY(0);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .memory-grid {
                max-width: 280px;
                gap: 10px;
            }

            .memory-box {
                border-radius: 10px;
                font-size: 28px;
            }

            .info-box {
                padding: 10px 14px;
                font-size: 13px;
            }

            .info-box span {
                font-size: 22px;
            }

            .status-text {
                font-size: 16px;
                top: 140px;
            }

            button {
                padding: 10px 18px;
                font-size: 13px;
            }
        }

        /* ===== ANIMATIONS ===== */
        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        .pulsing {
            animation: pulse 0.6s ease;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- INFO PANEL -->
        <div class="info-panel">
            <div class="info-box">
                🎯 Level<br><span id="levelDisplay">1</span>
            </div>
            <div class="info-box">
                📊 Score<br><span id="scoreDisplay">0</span>
            </div>
            <div class="info-box">
                🔥 Streak<br><span id="streakDisplay">0</span>
            </div>
        </div>

        <!-- STATUS TEXT -->
        <div class="status-text" id="statusText">Watch the sequence...</div>

        <!-- MEMORY GRID -->
        <div class="memory-grid" id="memoryGrid"></div>

        <!-- BUTTONS -->
        <div class="button-group">
            <button class="start-btn" id="startBtn" onclick="startGame()">Start Game</button>
            <button class="restart-btn" id="restartBtn" onclick="restartGame()" style="display: none;">Restart</button>
        </div>
    </div>

    <!-- GAME OVER MODAL -->
    <div class="modal" id="gameOverModal">
        <div class="modal-content">
            <h1>💀 Game Over!</h1>
            <div class="modal-stats">
                <div>Final Level: <span class="stat-num" id="finalLevel">1</span></div>
                <div>Total Score: <span class="stat-num" id="finalScore">0</span></div>
                <div>Best Streak: <span class="stat-num" id="finalStreak">0</span></div>
            </div>
            <button class="modal-btn" onclick="closeModal()">Play Again</button>
        </div>
    </div>

    <script>
        // Game State
        let gameState = {
            level: 1,
            score: 0,
            streak: 0,
            sequence: [],
            playerSequence: [],
            gameActive: false,
            isPlaying: false,
            flashSpeed: 500,
            inputSpeed: 1000,
            bestStreak: 0
        };

        const boxCount = 16;
        const colors = [
            '#FF6B6B', '#4ECDC4', '#FFD93D', '#667eea',
            '#FF69B4', '#51CF66', '#FFA500', '#00BCD4',
            '#9C27B0', '#E91E63', '#00E676', '#2196F3',
            '#FF5722', '#4CAF50', '#FF1744', '#3F51B5'
        ];

        // Initialize Grid
        function initGrid() {
            const grid = document.getElementById('memoryGrid');
            grid.innerHTML = '';

            for (let i = 0; i < boxCount; i++) {
                const box = document.createElement('div');
                box.className = 'memory-box';
                box.id = `box-${i}`;
                box.style.background = `linear-gradient(135deg, ${colors[i]}, ${adjustBrightness(colors[i], -20)})`;
                box.onclick = () => playerClick(i);
                grid.appendChild(box);
            }
        }

        // Adjust color brightness
        function adjustBrightness(color, percent) {
            let R = parseInt(color.substring(1, 3), 16);
            let G = parseInt(color.substring(3, 5), 16);
            let B = parseInt(color.substring(5, 7), 16);

            R = parseInt(R * (100 + percent) / 100);
            G = parseInt(G * (100 + percent) / 100);
            B = parseInt(B * (100 + percent) / 100);

            R = (R < 255) ? R : 255;
            G = (G < 255) ? G : 255;
            B = (B < 255) ? B : 255;

            const RR = ((R.toString(16).length == 1) ? '0' + R.toString(16) : R.toString(16));
            const GG = ((G.toString(16).length == 1) ? '0' + G.toString(16) : G.toString(16));
            const BB = ((B.toString(16).length == 1) ? '0' + B.toString(16) : B.toString(16));

            return '#' + RR + GG + BB;
        }

        // Start Game
        function startGame() {
            gameState.level = 1;
            gameState.score = 0;
            gameState.streak = 0;
            gameState.sequence = [];
            gameState.gameActive = true;
            gameState.flashSpeed = 500;
            gameState.inputSpeed = 1000;

            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('restartBtn').style.display = 'inline-block';

            disableAllBoxes(true);
            nextRound();
        }

        // Next Round
        function nextRound() {
            gameState.playerSequence = [];
            gameState.score += gameState.level * 10;
            updateUI();

            // Add new color to sequence
            const randomBox = Math.floor(Math.random() * boxCount);
            gameState.sequence.push(randomBox);

            updateStatus(`Level ${gameState.level} - Watch!`);
            disableAllBoxes(true);

            setTimeout(() => {
                playSequence();
            }, 500);
        }

        // Play Sequence
        async function playSequence() {
            disableAllBoxes(true);

            for (let i = 0; i < gameState.sequence.length; i++) {
                await new Promise(resolve => {
                    setTimeout(() => {
                        flashBox(gameState.sequence[i]);
                        resolve();
                    }, gameState.flashSpeed + 200);
                });
            }

            disableAllBoxes(false);
            updateStatus('Your turn!');
        }

        // Flash Box
        function flashBox(boxIndex) {
            const box = document.getElementById(`box-${boxIndex}`);
            box.classList.add('active');

            setTimeout(() => {
                box.classList.remove('active');
            }, gameState.flashSpeed);
        }

        // Player Click
        function playerClick(boxIndex) {
            if (!gameState.gameActive || gameState.isPlaying) return;

            gameState.playerSequence.push(boxIndex);
            flashBox(boxIndex);

            // Check if correct
            if (gameState.playerSequence[gameState.playerSequence.length - 1] !== gameState.sequence[gameState.playerSequence.length - 1]) {
                // Wrong!
                gameState.streak = 0;
                updateStatus('❌ Wrong! Game Over!');
                endGame();
                return;
            }

            // Check if sequence complete
            if (gameState.playerSequence.length === gameState.sequence.length) {
                gameState.streak++;
                gameState.level++;
                gameState.flashSpeed -= 20;
                updateStatus('✅ Correct! Next level...');
                updateUI();

                setTimeout(() => {
                    nextRound();
                }, 1500);
            }
        }

        // Update UI
        function updateUI() {
            document.getElementById('levelDisplay').textContent = gameState.level;
            document.getElementById('scoreDisplay').textContent = gameState.score;
            document.getElementById('streakDisplay').textContent = gameState.streak;
        }

        // Update Status
        function updateStatus(text) {
            const status = document.getElementById('statusText');
            status.textContent = text;
        }

        // Disable/Enable Boxes
        function disableAllBoxes(disable) {
            const boxes = document.querySelectorAll('.memory-box');
            boxes.forEach(box => {
                if (disable) {
                    box.classList.add('disabled');
                } else {
                    box.classList.remove('disabled');
                }
            });
        }

        // End Game
        function endGame() {
            gameState.gameActive = false;
            gameState.bestStreak = Math.max(gameState.bestStreak, gameState.streak);

            setTimeout(() => {
                document.getElementById('finalLevel').textContent = gameState.level;
                document.getElementById('finalScore').textContent = gameState.score;
                document.getElementById('finalStreak').textContent = gameState.streak;
                document.getElementById('gameOverModal').classList.add('active');
            }, 1500);
        }

        // Close Modal
        function closeModal() {
            document.getElementById('gameOverModal').classList.remove('active');
            restartGame();
        }

        // Restart Game
        function restartGame() {
            gameState.sequence = [];
            gameState.playerSequence = [];
            gameState.gameActive = false;
            
            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('restartBtn').style.display = 'none';
            
            updateStatus('Ready? Press Start!');
            initGrid();
            updateUI();
        }

        // Initialize on load
        window.addEventListener('load', () => {
            initGrid();
            updateStatus('Ready? Press Start!');
        });
    </script>
</body>
</html>
